<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    
    <main class="container">
        <header class="top-header">
            <button
                class="back-btn"
                aria-label="Volver"
                onclick="window.history.back()"
            >
                <svg
                width="28"
                height="28"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#000"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                >
                <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
    </header>
      <div class="login-container">
        <h1 class="title">Coqui 🐾</h1>
        <h2 class="login-subtitle">Iniciar Sesión</h2>
        <form class="login-form">
          <div class="input-group">
            <span class="icon-left">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#666"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                ></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </span>
            <input
              type="email"
              placeholder="Correo electronico"
              class="input-field"
              required
            />
          </div>

          <div class="input-group">
                    <span class="icon-left">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" placeholder="Contraseña" class="input-field" id="password-input" required>
                    <button type="button" class="icon-right" aria-label="Mostrar contraseña">
                        
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>

                
                <div class="forgot-password-container">
                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <a href="#" class="btn-primary login-btn">Iniciar sesión</a>
            </form>
        </div>
        </form>
      </div>
    </main>
  </body>
</html>
